name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: 🌐 Build Web
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📖 Read FVM config
        uses: kuhnroyal/flutter-fvm-config-action@v2
        id: fvm-config

      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm-config.outputs.FLUTTER_VERSION }}
          channel: ${{ steps.fvm-config.outputs.FLUTTER_CHANNEL }}
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🏗️ Build Web
        run: |
          flutter build web \
            --release \
            --dart-define=ENV=dev \
            --dart-define=API_BASE_URL=https://qa.horus-logistic.com/api \
            --base-href=/dragontec/

      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: 🚀 Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 🚀 Deploy
        id: deployment
        uses: actions/deploy-pages@v4
